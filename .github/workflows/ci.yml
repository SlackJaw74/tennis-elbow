name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: SwiftLint + SwiftFormat
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Run SwiftLint
        run: cd TennisElbow && swiftlint lint --strict

      - name: Run SwiftFormat (check only)
        run: cd TennisElbow && swiftformat --lint .

  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build
        run: |
          xcodebuild \
            -project "TennisElbow/TennisElbow.xcodeproj" \
            -scheme "TennisElbow" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 16e" \
            -derivedDataPath build \
            clean build \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project "TennisElbow/TennisElbow.xcodeproj" \
            -scheme "TennisElbow" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 16e" \
            -derivedDataPath build \
            -enableCodeCoverage YES \
            -only-testing:TennisElbowTests \
            | xcpretty && exit ${PIPESTATUS[0]}
